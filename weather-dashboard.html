<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stratos Weather</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Outfit', sans-serif;
  background: #0b0f1a;
  color: #dde3ef;
  height: 100vh;
  overflow: hidden;
}

.app { display:flex; height:100vh; }

/* Sidebar */
.sidebar {
  width: 320px;
  flex-shrink: 0;
  background: #0e1320;
  border-right: 1px solid rgba(255,255,255,0.06);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-header {
  padding: 24px 20px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

.logo {
  font-size: 1rem;
  font-weight: 600;
  letter-spacing: 1px;
  color: #fff;
  margin-bottom: 16px;
}
.logo span { color: #5eadf5; }

.search-wrap { position: relative; }
.search-wrap svg {
  position: absolute;
  left: 12px; top: 50%;
  transform: translateY(-50%);
  opacity: 0.3;
  pointer-events: none;
}
input[type="text"] {
  width: 100%;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px;
  padding: 10px 12px 10px 36px;
  color: #dde3ef;
  font-family: inherit;
  font-size: 0.85rem;
  outline: none;
  transition: border-color 0.2s;
}
input[type="text"]:focus { border-color: #5eadf5; }
input[type="text"]::placeholder { color: #2e3a4e; }

.tabs {
  display: flex;
  gap: 6px;
  padding: 12px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.tab-btn {
  flex: 1;
  padding: 6px 4px;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 8px;
  color: #3d4a60;
  font-family: inherit;
  font-size: 0.72rem;
  cursor: pointer;
  transition: 0.15s;
}
.tab-btn:hover { color: #dde3ef; background: rgba(255,255,255,0.04); }
.tab-btn.active { background: rgba(94,173,245,0.1); border-color: rgba(94,173,245,0.3); color: #5eadf5; }

.city-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px 12px 16px;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,0.06) transparent;
}
.city-list::-webkit-scrollbar { width: 3px; }
.city-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 4px; }

.region-label {
  font-size: 0.62rem;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: #2e3a4e;
  padding: 14px 8px 6px;
}

.city-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 12px;
  border-radius: 10px;
  cursor: pointer;
  transition: background 0.15s;
  margin-bottom: 2px;
}
.city-item:hover { background: rgba(255,255,255,0.04); }
.city-item.active { background: rgba(94,173,245,0.08); }
.city-item.active .city-name { color: #5eadf5; }

.city-left { display: flex; align-items: center; gap: 10px; }
.dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.city-name { font-size: 0.86rem; font-weight: 500; }
.city-country { font-size: 0.68rem; color: #3d4a60; margin-top: 1px; }
.city-right { text-align: right; }
.city-temp { font-size: 0.88rem; font-weight: 600; }
.city-time { font-size: 0.65rem; color: #3d4a60; margin-top: 2px; }

.no-results { display: none; text-align: center; padding: 32px 16px; color: #2e3a4e; font-size: 0.82rem; }
.no-results.show { display: block; }

/* Main */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 40px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.topbar-date { font-size: 0.78rem; color: #3d4a60; }
.unit-btn {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 8px;
  padding: 6px 14px;
  color: #7a8fa8;
  font-family: inherit;
  font-size: 0.8rem;
  cursor: pointer;
  transition: 0.15s;
}
.unit-btn:hover { color: #dde3ef; }

.content { flex: 1; display: flex; overflow: hidden; }

/* Hero */
.hero {
  flex: 1;
  padding: 48px 52px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.hero-city { font-size: 2.8rem; font-weight: 300; margin-bottom: 4px; }
.hero-sub { font-size: 0.82rem; color: #3d4a60; margin-bottom: 32px; }

.hero-temp-row { display: flex; align-items: flex-end; gap: 24px; }
.hero-temp { font-size: 7rem; font-weight: 200; line-height: 1; letter-spacing: -3px; }
.hero-temp-aside { padding-bottom: 10px; }
.feels { font-size: 0.76rem; color: #3d4a60; }
.feels-val { font-size: 1.1rem; font-weight: 500; margin-top: 2px; }
.condition { display: flex; align-items: center; gap: 8px; margin-top: 14px; font-size: 0.84rem; color: #7a8fa8; }

.stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
}
.stat {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 14px;
  padding: 18px 16px;
  transition: background 0.15s;
}
.stat:hover { background: rgba(255,255,255,0.05); }
.stat-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1.5px; color: #3d4a60; display: block; margin-bottom: 8px; }
.stat-val { font-size: 1.4rem; font-weight: 500; }
.stat-unit { font-size: 0.75rem; color: #3d4a60; margin-left: 2px; }
.stat-note { font-size: 0.68rem; color: #3d4a60; margin-top: 4px; }

/* Right panel */
.right {
  width: 240px;
  border-left: 1px solid rgba(255,255,255,0.06);
  overflow-y: auto;
  scrollbar-width: none;
}
.right::-webkit-scrollbar { display: none; }

.panel-section {
  padding: 22px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.panel-title {
  font-size: 0.62rem;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: #2e3a4e;
  margin-bottom: 14px;
}

.forecast-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 7px 0;
  border-bottom: 1px solid rgba(255,255,255,0.03);
}
.forecast-row:last-child { border: none; }
.fc-day { font-size: 0.76rem; color: #3d4a60; width: 36px; }
.fc-icon { font-size: 17px; }
.fc-temps { font-size: 0.76rem; text-align: right; }
.fc-hi { color: #dde3ef; }
.fc-lo { color: #3d4a60; margin-left: 5px; }

.meter { margin-bottom: 12px; }
.meter:last-child { margin-bottom: 0; }
.meter-header { display: flex; justify-content: space-between; font-size: 0.74rem; margin-bottom: 6px; }
.meter-name { color: #7a8fa8; }
.meter-reading { color: #5eadf5; }
.bar { height: 4px; background: rgba(255,255,255,0.06); border-radius: 4px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 4px; }

.sun-row { display: flex; gap: 10px; }
.sun-card {
  flex: 1;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: 10px;
  padding: 12px;
  text-align: center;
}
.sun-card .ico { font-size: 18px; margin-bottom: 6px; }
.sun-card .lbl { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 1px; color: #2e3a4e; }
.sun-card .val { font-size: 0.78rem; color: #7a8fa8; margin-top: 3px; }
</style>
</head>

<div class="app">

    <div class="sidebar-header">

      <div class="search-wrap">

        <input type="text" id="searchInput" placeholder="Search city or country…" oninput="renderSidebar()">
      </div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="setTab('all',this)">All</button>
      <button class="tab-btn" onclick="setTab('asia',this)">Asia</button>
      <button class="tab-btn" onclick="setTab('europe',this)">Europe</button>
      <button class="tab-btn" onclick="setTab('americas',this)">Americas</button>
    </div>

    <div class="city-list" id="cityList">
      <div class="no-results" id="noResults">No cities found</div>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <span class="topbar-date" id="topDate"></span>
      <button class="unit-btn" id="unitBtn" onclick="toggleUnit()">Switch to °F</button>
    </div>
    <div class="content">
      <div class="hero" id="hero"></div>
      <div class="right" id="right"></div>
    </div>
  </div>

</div>

let active = cities[0];
let isCelsius = true;
let currentTab = 'all';

function tempColor(t) {
  if (t >= 35) return '#f97316';
  if (t >= 25) return '#fbbf24';
  if (t >= 15) return '#5eadf5';
  if (t >= 5)  return '#93c5fd';
  return '#e0f2fe';
}

function display(t) {
  return isCelsius ? t + '°' : Math.round(t * 9/5 + 32) + '°';
}

function uvLabel(u) {
  return u <= 2 ? 'Low' : u <= 5 ? 'Moderate' : u <= 7 ? 'High' : 'Very high';
}

function aqiLabel(a) {
  return a <= 50 ? 'Good' : a <= 100 ? 'Moderate' : a <= 150 ? 'Unhealthy' : 'Hazardous';
}

function renderSidebar() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const list = document.getElementById('cityList');
  list.querySelectorAll('.region-label, .city-item').forEach(e => e.remove());

  const groups = {};
  cities.forEach(c => {
    if (currentTab !== 'all' && c.continent !== currentTab) return;
    if (q && !c.name.toLowerCase().includes(q) && !c.country.toLowerCase().includes(q)) return;
    (groups[c.region] = groups[c.region] || []).push(c);
  });

  const noResults = document.getElementById('noResults');
  let count = 0;

  Object.entries(groups).forEach(([region, items]) => {
    const lbl = document.createElement('div');
    lbl.className = 'region-label';
    lbl.textContent = region;
    list.insertBefore(lbl, noResults);

    items.forEach(c => {
      count++;
      const el = document.createElement('div');
      el.className = 'city-item' + (c.id === active.id ? ' active' : '');
      el.dataset.id = c.id;
      el.innerHTML = `
        <div class="city-left">
          <span class="dot" style="background:${c.dot}"></span>
          <div>
            <div class="city-name">${c.name}</div>
            <div class="city-country">${c.country}</div>
          </div>
        </div>
        <div class="city-right">
          <div class="city-temp" style="color:${tempColor(c.temp)}">${display(c.temp)}</div>
          <div class="city-time">${c.time}</div>
        </div>
      `;
      el.onclick = () => select(c.id);
      list.insertBefore(el, noResults);
    });
  });

  noResults.classList.toggle('show', count === 0);
}

function renderHero() {
  const c = active;
  const color = tempColor(c.temp);
  document.getElementById('hero').innerHTML = `
    <div>
      <h1 class="hero-city">${c.name}</h1>
      <div class="hero-sub">${c.country} &nbsp;·&nbsp; ${c.time}</div>
      <div class="hero-temp-row">
        <div class="hero-temp" style="color:${color}">${display(c.temp)}</div>
        <div class="hero-temp-aside">
          <div class="feels">Feels like</div>
          <div class="feels-val" style="color:${color}">${display(c.feels)}</div>
          <div class="condition"><span>${c.icon}</span> ${c.cond}</div>
        </div>
      </div>
    </div>
    <div class="stats">
      <div class="stat">
        <span class="stat-label">Humidity</span>
        <span class="stat-val">${c.humidity}<span class="stat-unit">%</span></span>
        <div class="stat-note">${c.humidity < 40 ? 'Dry' : c.humidity < 70 ? 'Comfortable' : 'Humid'}</div>
      </div>
      <div class="stat">
        <span class="stat-label">Wind</span>
        <span class="stat-val">${c.wind}<span class="stat-unit">km/h</span></span>
        <div class="stat-note">${c.wind < 10 ? 'Calm' : c.wind < 25 ? 'Moderate' : 'Strong'}</div>
      </div>
      <div class="stat">
        <span class="stat-label">Visibility</span>
        <span class="stat-val">${c.vis}<span class="stat-unit">km</span></span>
        <div class="stat-note">${c.vis < 4 ? 'Poor' : c.vis < 10 ? 'Fair' : 'Good'}</div>
      </div>
      <div class="stat">
        <span class="stat-label">Pressure</span>
        <span class="stat-val">${c.pressure}<span class="stat-unit">hPa</span></span>
        <div class="stat-note">${c.pressure > 1020 ? 'High' : c.pressure > 1010 ? 'Normal' : 'Low'}</div>
      </div>
    </div>
  `;
}

function renderRight() {
  const c = active;
  const uvPct  = Math.min(c.uv  / 11  * 100, 100);
  const aqiPct = Math.min(c.aqi / 300 * 100, 100);
  const aqiColor = c.aqi <= 50 ? '#4ade80' : c.aqi <= 100 ? '#fbbf24' : c.aqi <= 150 ? '#f97316' : '#ef4444';
  const uvColor  = c.uv  <= 2  ? '#4ade80' : c.uv  <= 5  ? '#fbbf24' : c.uv  <= 7  ? '#f97316' : '#ef4444';

  document.getElementById('right').innerHTML = `
    <div class="panel-section">
      <div class="panel-title">5-Day Forecast</div>
      ${c.forecast.map(f => `
        <div class="forecast-row">
          <span class="fc-day">${f.d}</span>
          <span class="fc-icon">${f.i}</span>
          <span class="fc-temps"><span class="fc-hi">${display(f.h)}</span><span class="fc-lo">${display(f.l)}</span></span>
        </div>
      `).join('')}
    </div>
    <div class="panel-section">
      <div class="panel-title">Air & UV</div>
      <div class="meter">
        <div class="meter-header"><span class="meter-name">UV Index</span><span class="meter-reading">${c.uv} · ${uvLabel(c.uv)}</span></div>
        <div class="bar"><div class="bar-fill" style="width:${uvPct}%;background:${uvColor}"></div></div>
      </div>
      <div class="meter">
        <div class="meter-header"><span class="meter-name">Air Quality</span><span class="meter-reading">AQI ${c.aqi} · ${aqiLabel(c.aqi)}</span></div>
        <div class="bar"><div class="bar-fill" style="width:${aqiPct}%;background:${aqiColor}"></div></div>
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-title">Sun</div>
      <div class="sun-row">
        <div class="sun-card"><div class="ico">🌅</div><div class="lbl">Sunrise</div><div class="val">${c.sunrise}</div></div>
        <div class="sun-card"><div class="ico">🌇</div><div class="lbl">Sunset</div><div class="val">${c.sunset}</div></div>
      </div>
    </div>
  `;
}

function select(id) {
  active = cities.find(c => c.id === id);
  renderHero();
  renderRight();
  document.querySelectorAll('.city-item').forEach(el =>
    el.classList.toggle('active', el.dataset.id === id)
  );
}

function setTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderSidebar();
}

function toggleUnit() {
  isCelsius = !isCelsius;
  document.getElementById('unitBtn').textContent = isCelsius ? 'Switch to °F' : 'Switch to °C';
  renderSidebar();
  renderHero();
  renderRight();
}

document.getElementById('topDate').textContent =
  new Date().toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

renderSidebar();
renderHero();
renderRight();
</script>
</body>
</html>
